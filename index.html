<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡ALERTA DE CUMPLEAÑOS! 🎂</title>
    <style>
        :root {
            --primary: #ff4757;
            --secondary: #2ed573;
            --accent: #ffa502;
        }

        body {
            background-color: #2f3542;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            padding: 50px 20px;
        }

        h1 {
            font-size: 3rem;
            text-shadow: 3px 3px var(--primary);
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-10px); }
        }

        .gallery {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .photo-card {
            position: relative;
            width: 250px;
            height: 300px;
            border: 5px solid white;
            border-radius: 15px;
            overflow: hidden;
            background: #57606f;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        /* FILTROS Y ANIMACIONES DE FOTOS */
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Filtro inicial gracioso (Sepia + Desenfoque) */
            filter: sepia(1) blur(2px) contrast(1.2);
            transition: 0.5s ease;
        }

        .photo-card:hover {
            transform: scale(1.1) rotate(5deg);
            border-color: var(--secondary);
            box-shadow: 0 0 30px var(--secondary);
        }

        .photo-card:hover img {
            /* Al pasar el mouse se revela la foto real con brillo */
            filter: sepia(0) blur(0) contrast(1);
            animation: party-flash 0.5s infinite;
        }

        @keyframes party-flash {
            0% { brightness: 1; }
            50% { filter: brightness(1.3) hue-rotate(90deg); }
            100% { brightness: 1; }
        }

        .caption {
            position: absolute;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            width: 100%;
            padding: 10px 0;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .button-panic {
            margin-top: 50px;
            padding: 20px 40px;
            font-size: 1.5rem;
            background: var(--accent);
            border: none;
            border-radius: 50px;
            color: black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 0 #cc8400;
        }

        .button-panic:active {
            box-shadow: 0 2px 0 #cc8400;
            transform: translateY(8px);
        }

        /* Confeti simple con CSS */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: var(--primary);
            top: -10px;
            z-index: -1;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🚨 ¡NIVEL DE CUMPLEAÑOS CRÍTICO! 🚨</h1>
        <p style="font-size: 1.2rem;">Se informa que hoy una leyenda se hace un poco más... "vintage".</p>

        <div class="gallery">
            <!-- FOTO 1: Reemplaza 'foto1.jpg' por el nombre de tu archivo -->
            <div class="photo-card">
                <img src="https://drive.google.com/uc?export=download&id=1xYLjHON7WLRgEPt8KjdjMzJpzs_KiJWt" alt="Cumpleañero">
                <div class="caption">EL REGALO</div>
            </div>

            <!-- FOTO 2 -->
            <div class="photo-card">
                <img src="https://via.placeholder.com/250x300?text=Foto+Sexy+Aqui" alt="Cumpleañero">
                <div class="caption">LA COMIDA</div>
            </div>

            <!-- FOTO 3 -->
            <div class="photo-card">
                <img src="https://via.placeholder.com/250x300?text=Foto+Borracho+Aqui" alt="Cumpleañero">
                <div class="caption">EL PASTEL</div>
            </div>
        </div>

        <button class="button-panic" onclick="lanzarFiesta()">¡BOTÓN DE PÁNICO FESTIVO!</button>
        
        <div id="mensaje-extra" style="margin-top: 30px; display: none;">
            <h2 style="color: var(--secondary);">¡FELICIDADES! 🎉</h2>
            <p>Has desbloqueado un año más de sabiduría (o de dolor de espalda).</p>
        </div>
    </div>

    <script>
        function lanzarFiesta() {
            document.getElementById('mensaje-extra').style.display = 'block';
            
            // Generar confeti
            for(let i=0; i<100; i++) {
                const confeti = document.createElement('div');
                confeti.className = 'confetti';
                confeti.style.left = Math.random() * 100 + 'vw';
                confeti.style.backgroundColor = ['#ff4757','#2ed573','#ffa502','#1e90ff','#eccc68'][Math.floor(Math.random()*5)];
                confeti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                confeti.style.opacity = Math.random();
                document.body.appendChild(confeti);
                
                // Limpiar confeti después de que caiga
                setTimeout(() => confeti.remove(), 5000);
            }
            
            alert("⚠️ AVISO: Se ha detectado un exceso de juventud acumulada. ¡A comer pastel!");
        }
    </script>
</body>
</html>
